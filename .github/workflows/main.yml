name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger when main branch is updated

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy HTML to gh-pages branch
        run: |
          # Configure git
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check if _build/html exists
          if [ ! -d "_build/html" ]; then
            echo "Error: _build/html directory not found!"
            exit 1
          fi
          
          # Clone the repository to a temporary directory
          git clone --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages-deploy
          
          # Remove old content (preserve .git and .nojekyll)
          cd gh-pages-deploy
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.nojekyll' -exec rm -rf {} +
          
          # Copy new HTML content
          cp -r ../_build/html/* .
          
          # Ensure .nojekyll exists
          touch .nojekyll
          
          # Add, commit and push
          git add .
          
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy documentation (source commit: ${{ github.sha }})"
            git push origin gh-pages
            echo "Successfully deployed to gh-pages!"
          fi
